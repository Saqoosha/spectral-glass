name: Deploy to GitHub Pages

# Builds the vite bundle and publishes dist/ to GitHub Pages on every push to
# main. The user must enable Pages once in repo settings → Pages → Source:
# "GitHub Actions" for the deploy job to actually surface a URL.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages:    write
  id-token: write

# One Pages deployment at a time; queue them rather than racing.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url:  ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build (vite + tsc --noEmit)
        run: bun run build

      - name: Configure Pages
        uses: actions/configure-pages@v5
        # Auto-enable Pages on first run instead of asking the user to flip it
        # in repo settings. The default repo source `gh-pages` branch never
        # gets created either way; the upload-pages-artifact step below ships
        # the dist/ tarball straight to the Pages CDN.
        with:
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy
        id:   deploy
        uses: actions/deploy-pages@v4
